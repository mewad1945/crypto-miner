<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Private Miner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Miner Dashboard</h1>
        <div class="controls">
            <button id="startBtn">STARTA</button>
            <button id="stopBtn">STOPPA</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card">Status: <span id="status">Avstängd</span></div>
            <div class="stat-card">Hashrate: <span id="hashrate">0</span> H/s</div>
            <div class="stat-card">Pending: <span id="total-mined">0</span> XMR</div>
            <div class="stat-card">Totala Hashes: <span id="shares">0</span></div>
        </div>
        <div id="logs"></div>
    </div>

    <!-- Ladda biblioteket FÖRST -->
    <script src="https://monero-ocean.github.io/xmrig-proxy/web-miner/miner.js"></script>
    <!-- Ladda din kod SEN -->
    <script src="script.js"></script>
</body>
</html>
